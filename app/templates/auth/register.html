<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/ethics-shell.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  </head>
  <body class="login-page">
    <main class="auth-panel login-bg" id="main-content">
      <div class="auth-card">
        <img src="{{ url_for('static', filename='img/uj_logo.png') }}" alt="UJ" class="auth-logo">
        <h1 class="login-heading">Create MBA Student Account</h1>
        <p class="login-subheading">Use your student email address</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="flash-stack">
              {% for category, message in messages %}
                <div class="flash flash--{{ category }}">{{ message }}</div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form method="post" class="form-stack">
          <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
          <input type="hidden" name="system" value="mba">
          <label>
            Student Email Address
            <input type="email" name="student_email" value="{{ student_email or '' }}" placeholder="student@example.com" required>
          </label>
          <label>
            Password
            <input type="password" name="password" required autocomplete="new-password">
          </label>
          <label>
            Confirm Password
            <input type="password" name="confirm_password" required autocomplete="new-password">
          </label>
          <button type="submit" class="primary-button">Create student account</button>
        </form>

        <div class="auth-links">
          <a href="{{ url_for('auth.login') }}">Back to sign in</a>
        </div>
      </div>
    </main>
  </body>
</html>
